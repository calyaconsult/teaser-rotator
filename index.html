<!DOCTYPE html>
<html lang="en">

    <title>Grid Rotation</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Grid Rotation System</h1>
    <div class="subtitle">Click the button to rotate the grid elements</div>

    <div id="highlights">
        <!-- Row 1 (Ignored) -->
        <div class="row">
            <div class="child">Row 1 - A</div>
            <div class="child">Row 1 - B</div>
            <div class="child">Row 1 - C</div>
        </div>

        <!-- Row 2 -->
        <div class="row">
            <div class="child">2.1</div>
            <div class="child">2.2</div>
            <div class="child">2.3</div>
        </div>

        <!-- Row 3 -->
        <div class="row">
            <div class="child">3.1</div>
            <div class="child">3.2</div>
            <div class="child">3.3</div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
