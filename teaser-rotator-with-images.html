<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Rotation System with Images</title>
    <link rel="stylesheet" href="css/style-w-images.css">
</head>
<body>
    <h1>Grid Rotation System with Images</h1>
    <div class="subtitle">Interactive Dashboard Interface</div>

    <div id="highlights">
        <!-- Row 1 -->
        <div class="row">
            <div class="child">
              <img class="thumbnail" src="./images/spalte-1A.png" alt="Abstract A">
              <div>UNIT 01-A</div>
            </div>
            <div class="child">
              <img class="thumbnail" src="./images/spalte-2B.png" alt="Abstract B">
              <div>UNIT 01-B</div>
            </div>
            <div class="child">
              <img class="thumbnail" src="./images/spalte-3C.png" alt="Abstract C">
              <div>UNIT 01-C</div>
            </div>
        </div>

        <!-- Row 2 -->
        <div class="row">
          <div class="child">
            <img class="thumbnail" src="./images/abstract-logo-1.jpg" alt="Logo 1">
            <div>UNIT 02-1</div>
          </div>
          <div class="child">
              <img class="thumbnail" src="./images/abstract-logo-2.jpg" alt="Logo 2">
              <div>UNIT 02-2</div>
          </div>
          <div class="child">
            <img class="thumbnail" src="./images/abstract-logo-3.jpg" alt="Logo 3">
            <div>UNIT 02-3</div>
         </div>
        </div>

        <!-- Row 3 -->
        <div class="row">
          <div class="child">
            <img class="thumbnail" src="./images/abstract-logo-4.jpg" alt="Logo 4">
            <div>UNIT 03-1</div>
          </div>
          <div class="child">
              <img class="thumbnail" src="./images/abstract-logo-5.jpg" alt="Logo 5">
              <div>UNIT 03-2</div>
          </div>
          <div class="child">
            <img class="thumbnail" src="./images/abstract-logo-6.jpg" alt="Logo 6">
            <div>UNIT 03-3</div>
         </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
